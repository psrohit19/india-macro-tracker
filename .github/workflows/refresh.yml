# Refresh of the India Macro Tracker -> GitHub Pages, every 4 hours.
# Anchored so one run lands at 19:45 IST, right after market close / NSDL+NSE prints.
# Runs (IST): 03:45, 07:45, 11:45, 15:45, 19:45, 23:45.
name: refresh-dashboard
on:
  schedule:
    - cron: "15 2,6,10,14,18,22 * * *"   # every 4 hours (UTC); 14:15 UTC = 19:45 IST
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests beautifulsoup4 lxml
      - run: python pipeline/refresh.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard.html index.html edition.html
          git diff --cached --quiet || git commit -m "refresh $(date -u +'%F %H:%M')"
          git push
      # GitHub Pages (deploy from branch: main, / root) picks up index.html
      # automatically after the push — no separate deploy step needed.
